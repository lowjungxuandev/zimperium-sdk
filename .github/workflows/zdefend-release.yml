name: zDefend Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional GitHub release tag. Defaults to v<signed version>"
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup environment
        env:
          REQUEST_ID: ${{ secrets.REQUEST_ID }}
          TOKEN: ${{ secrets.TOKEN }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
          ZDEFEND_ANDROID_CSV: ${{ secrets.ZDEFEND_ANDROID_CSV }}
          ZDEFEND_IOS_CSV: ${{ secrets.ZDEFEND_IOS_CSV }}
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y jq unzip zip curl openssl

          : "${REQUEST_ID:?Missing GitHub secret REQUEST_ID}"
          : "${TOKEN:?Missing GitHub secret TOKEN}"
          : "${API_TOKEN:?Missing GitHub secret API_TOKEN}"

          printf 'Request_ID=%s\nToken=%s\nAPI_Token=%s\n' \
            "$REQUEST_ID" \
            "$TOKEN" \
            "$API_TOKEN" > .env

          if [ -n "${ZDEFEND_ANDROID_CSV:-}" ]; then
            mkdir -p csv/android
            printf '%s\n' "$ZDEFEND_ANDROID_CSV" > csv/android/zdefend.csv
          fi

          if [ -n "${ZDEFEND_IOS_CSV:-}" ]; then
            mkdir -p csv/ios
            printf '%s\n' "$ZDEFEND_IOS_CSV" > csv/ios/zdefend.csv
          fi

          chmod +x scripts/download.sh scripts/csv.sh scripts/sign.sh scripts/test.sh

      - name: download.sh
        run: ./scripts/download.sh

      - name: csv.sh
        run: ./scripts/csv.sh

      - name: sign.sh
        run: ./scripts/sign.sh

      - name: Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail

          VERSION_DIR="$(find tmp/zdefend/output -mindepth 1 -maxdepth 1 -type d | sort | head -1)"
          [ -n "$VERSION_DIR" ] || { echo "No signed output found in tmp/zdefend/output"; exit 1; }

          VERSION="$(basename "$VERSION_DIR")"
          TAG="${INPUT_RELEASE_TAG:-v$VERSION}"
          AAR="${VERSION_DIR}/android/ZDefend.aar"
          IOS_DIR="${VERSION_DIR}/iOS/ZDefend.xcframework"
          IOS_ZIP="${VERSION_DIR}/iOS/ZDefend.xcframework.zip"
          FILES=()

          [ -f "$AAR" ] || { echo "Missing $AAR"; exit 1; }
          FILES+=("$AAR")

          if [ -d "$IOS_DIR" ]; then
            (
              cd "${VERSION_DIR}/iOS"
              rm -f ZDefend.xcframework.zip
              zip -rq ZDefend.xcframework.zip ZDefend.xcframework
            )
            FILES+=("$IOS_ZIP")
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${FILES[@]}" --clobber
          else
            gh release create "$TAG" "${FILES[@]}" \
              --title "$TAG" \
              --generate-notes
          fi
